name: Keep Supabase Alive

on:
  schedule:
    # Twice a week (Monday & Thursday, 09:00 UTC) — stays under the 7-day free-tier pause window
    - cron: "0 9 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping doctors table
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "Missing GitHub secrets: NEXT_PUBLIC_SUPABASE_URL and SUPABASE_SECRET_KEY"
            exit 1
          fi

          response=$(curl -sS -o /tmp/supabase-ping.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/doctors?select=id&limit=1" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Accept: application/json")

          echo "HTTP status: ${response}"
          cat /tmp/supabase-ping.json
          echo

          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Keep-alive ping failed"
            exit 1
          fi

          echo "Supabase keep-alive ping succeeded"
